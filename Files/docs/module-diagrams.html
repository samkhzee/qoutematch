  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #fff;
      --border: #d8dee6;
      --text: #1a2332;
      --muted: #5c6778;
      --accent: #1f5f8a;
      --accent-soft: #e8f1f7;
      --node-fill: #fff;
      --node-stroke: #9aa8b8;
      --arrow: #1f5f8a;
      --sidebar-w: 280px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
    }
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1rem 0;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    aside h1 {
      font-size: 0.95rem;
      margin: 0 1rem 0.4rem;
      color: var(--accent);
    }
    aside p {
      font-size: 0.75rem;
      color: var(--muted);
      margin: 0 1rem 1rem;
    }
    nav button {
      display: block;
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      padding: 0.4rem 1rem;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text);
    }
    nav button:hover { background: var(--accent-soft); }
    nav button.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      border-left: 3px solid var(--accent);
      padding-left: calc(1rem - 3px);
    }
    nav .group {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding: 0.75rem 1rem 0.25rem;
    }
    main { padding: 1.5rem 2rem 3rem; max-width: 1140px; }
    .panel { display: none; }
    .panel.active { display: block; }
    h2 { margin: 0 0 0.4rem; font-size: 1.45rem; }
    .subtitle { color: var(--muted); margin-bottom: 1rem; }
    .source {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: var(--accent-soft);
      border-radius: 6px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .card h3 { margin: 0 0 0.75rem; font-size: 0.95rem; }
    .diagram-wrap {
      overflow-x: auto;
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
    }
    svg.diagram { display: block; margin: 0 auto; }
    .node rect {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 1.5;
    }
    .node.accent rect { fill: var(--accent-soft); stroke: var(--accent); }
    .node text {
      fill: var(--text);
      font-size: 11px;
      font-family: inherit;
    }
    .edge line { stroke: var(--arrow); stroke-width: 1.5; fill: none; }
    .edge text { fill: var(--muted); font-size: 10px; font-family: inherit; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th, td {
      border: 1px solid var(--border);
      padding: 0.45rem 0.6rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: #eef2f6; }
    ol.checklist, ul.checklist { margin: 0; padding-left: 1.25rem; }
    ol.checklist li, ul.checklist li { margin-bottom: 0.3rem; }
    .urls code, .pill {
      display: inline-block;
      background: #eef2f6;
      padding: 0.12rem 0.45rem;
      border-radius: 4px;
      margin: 0.12rem 0.2rem 0.12rem 0;
      font-size: 0.8rem;
    }
    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-right: 0.3rem;
    }
    .cols-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--border); }
      main { padding: 1rem; }
      .cols-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>

    function nodeCenter(n) {
      return { x: n.x + NODE_W / 2, y: n.y + NODE_H / 2 };
    }

    function renderDiagram(spec) {
      if (!spec) return "";
      const nodes = spec.nodes;
      const maxX = Math.max(...nodes.map(n => n.x + NODE_W)) + 40;
      const maxY = Math.max(...nodes.map(n => n.y + NODE_H)) + 40;
      const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
      let edgesSvg = "";
      for (const edge of spec.edges) {
        const [from, to, label] = edge;
        const a = nodeCenter(byId[from]);
        const b = nodeCenter(byId[to]);
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.hypot(dx, dy) || 1;
        const ux = dx / len, uy = dy / len;
        const x1 = a.x + ux * (NODE_W / 2 + 2);
        const y1 = a.y + uy * (NODE_H / 2 + 2);
        const x2 = b.x - ux * (NODE_W / 2 + 6);
        const y2 = b.y - uy * (NODE_H / 2 + 6);
        edgesSvg += `<line class="edge" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" marker-end="url(#arrow)"/>`;
        if (label) {
          edgesSvg += `<text class="edge" x="${(x1+x2)/2}" y="${(y1+y2)/2 - 6}" text-anchor="middle">${label}</text>`;
        }
      }
      let nodesSvg = "";
      for (const n of nodes) {
        const cls = n.accent ? "node accent" : "node";
        nodesSvg += `<g class="${cls}">
          <rect x="${n.x}" y="${n.y}" width="${NODE_W}" height="${NODE_H}" rx="6"/>
          <text x="${n.x + NODE_W/2}" y="${n.y + NODE_H/2 + 4}" text-anchor="middle">${n.label}</text>
        </g>`;
      }
      return `<div class="diagram-wrap">
        <svg class="diagram" width="${maxX}" height="${maxY}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L6,3 L0,6 Z" fill="#1f5f8a"/>
            </marker>
          </defs>
          ${edgesSvg}${nodesSvg}
        </svg>
      </div>`;
    }

    function renderPanel(mod) {
      let html = `<h2>${mod.title}</h2>`;
      if (mod.subtitle) html += `<p class="subtitle">${mod.subtitle}</p>`;
      if (mod.source) html += `<div class="source">Source: ${mod.source}</div>`;
      if (mod.diagram) {
        html += `<div class="card"><h3>Flow diagram</h3>${renderDiagram(mod.diagram)}</div>`;
      }
      if (mod.notes && mod.notes.length) {
        html += `<div class="card"><h3>Blueprint notes</h3><ul class="checklist">`;
        mod.notes.forEach(n => { html += `<li>${n}</li>`; });
        html += `</ul></div>`;
      }
      if (mod.tests && mod.tests.length) {
        html += `<div class="card"><h3>QA checklist (from blueprint)</h3><ol class="checklist">`;
        mod.tests.forEach(t => { html += `<li>${t}</li>`; });
        html += `</ol></div>`;
      }
      if (mod.appMap) {
        html += `<div class="card"><h3>App mapping</h3><p>${mod.appMap}</p></div>`;
      }
      if (mod.urls && mod.urls.length) {
        html += `<div class="card urls"><h3>Smoke URLs</h3><p>`;
        mod.urls.forEach(u => { html += `<code>${u}</code>`; });
        html += `</p></div>`;
      }
      if (mod.extra) html += mod.extra;
      return html;
    }

    const nav = document.getElementById("nav");
    const main = document.getElementById("main");
    let lastGroup = "";
    MODULES.forEach((mod, i) => {
      if (mod.group && mod.group !== lastGroup) {
        nav.insertAdjacentHTML("beforeend", `<div class="group">${mod.group}</div>`);
        lastGroup = mod.group;
      }
      const btn = document.createElement("button");
      btn.textContent = mod.title.replace(/^\d+(\.\d+)?\.?\s*/, "").slice(0, 42);
      btn.title = mod.title;
      btn.dataset.id = mod.id;
      btn.addEventListener("click", () => show(mod.id));
      nav.appendChild(btn);
      const panel = document.createElement("div");
      panel.className = "panel" + (i === 0 ? " active" : "");
      panel.id = "panel-" + mod.id;
      panel.innerHTML = renderPanel(mod);
      main.appendChild(panel);
    });

    function show(id) {
      document.querySelectorAll("#nav button").forEach(b =>
        b.classList.toggle("active", b.dataset.id === id));
      document.querySelectorAll(".panel").forEach(p =>
        p.classList.toggle("active", p.id === "panel-" + id));
      location.hash = id;
    }

    const hash = location.hash.replace("#", "");
    if (hash && MODULES.some(m => m.id === hash)) show(hash);
    else show("overview");
  </script>
